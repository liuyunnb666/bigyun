spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              lowerCaseServiceId: true
              enabled: true
          routes:
            - id: bigyun-auth
              uri: lb://bigyun-auth
              predicates:
                - Path=/auth/**
              filters:
                - name: CacheRequestBody
                  args:
                    bodyClass: java.lang.String
                - ValidateCodeFilter
                - StripPrefix=1
            - id: bigyun-system
              uri: lb://bigyun-system
              predicates:
                - Path=/system/**
              filters:
                - StripPrefix=1
            - id: bigyun-gen
              uri: lb://bigyun-gen
              predicates:
                - Path=/code/**
              filters:
                - StripPrefix=1
            - id: bigyun-job
              uri: lb://bigyun-job
              predicates:
                - Path=/schedule/**
              filters:
                - StripPrefix=1
            - id: bigyun-file
              uri: lb://bigyun-file
              predicates:
                - Path=/file/**
              filters:
                - StripPrefix=1
            - id: bigyun-config
              uri: lb://bigyun-config
              predicates:
                - Path=/provider/**
              filters:
                - StripPrefix=1
            - id: bigyun-demo
              uri: lb://bigyun-demo
              predicates:
                - Path=/demo/**
              filters:
                - StripPrefix=1
            - id: bigyun-payment
              uri: lb://bigyun-payment
              predicates:
                - Path=/payment/**
              filters:
                - StripPrefix=1

security:
  captcha:
    enabled: true
    type: math
  xss:
    enabled: true
    excludeUrls:
      - /system/notice
  ignore:
    whites:
      - /auth/logout
      - /auth/login
      - /auth/register
      - /*/v2/api-docs
      - /*/v3/api-docs
      - /csrf
